<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First App</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { color: #22d3ee; font-size: 32px; margin-bottom: 10px; }
    p  { color: #94a3b8; font-size: 16px; margin-bottom: 30px; }
    button {
      background: #22d3ee;
      color: #0f0f0f;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #06b6d4; }
    #msg { margin-top: 20px; font-size: 20px; color: #10b981; }
  </style>
</head>
<body>
  <h1>🚀 My First Web App</h1>
  <p>If you can see this — hosting works!</p>
  <button onclick="document.getElementById('msg').innerText = '✅ It works! You are ready to deploy Machine Doctor!'">
    Tap to Test
  </button>
  <div id="msg"></div>
</body>
</html>

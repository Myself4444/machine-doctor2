<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Machine Doctor — AI Precision Diagnostic System</title>
  <meta name="description" content="AI-powered diagnostic tool for cars, trucks, industrial machines and generators. Get instant repair guidance with Indian Rupee cost estimates." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060810; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── REPLACE THIS WITH YOUR ANTHROPIC API KEY ──
    const API_KEY = "YOUR_API_KEY_HERE";

    const CATALOG = {
      car: {
        name: "Car / SUV", emoji: "🚗", color: "#3b82f6",
        systems: {
          engine: { name: "Engine", emoji: "🔩", components: ["Timing Belt / Chain","Pistons & Cylinders","Head Gasket","Camshaft","Crankshaft","Oil Pump","Valve Train","Engine Mounts","Intake Manifold","Exhaust Manifold"] },
          cooling: { name: "Cooling System", emoji: "🌡️", components: ["Radiator","Water Pump","Thermostat","Coolant Reservoir","Cooling Fan","Heater Core","Radiator Hoses"] },
          transmission: { name: "Transmission", emoji: "⚙️", components: ["Gearbox","Clutch","Torque Converter","Driveshaft","CV Joint / Axle","Transfer Case","Differential"] },
          brakes: { name: "Brakes", emoji: "🛑", components: ["Brake Pads","Brake Rotors / Discs","Brake Calipers","ABS Pump & Module","Master Cylinder","Brake Lines","Handbrake Cable"] },
          suspension: { name: "Suspension & Steering", emoji: "🔧", components: ["Shock Absorbers","Struts","Ball Joints","Tie Rods","Control Arms","Sway Bar / Links","Power Steering Pump","Wheel Bearings"] },
          electrical: { name: "Electrical System", emoji: "⚡", components: ["Battery","Alternator","Starter Motor","Fuse Box","O2 Sensor","MAF Sensor","ECU / ECM","Ignition Coil","Spark Plugs","Wiring Harness"] },
          fuel: { name: "Fuel System", emoji: "⛽", components: ["Fuel Pump","Fuel Injectors","Fuel Filter","Fuel Pressure Regulator","Throttle Body","Fuel Tank"] },
          exhaust: { name: "Exhaust System", emoji: "💨", components: ["Catalytic Converter","Muffler / Silencer","Exhaust Manifold","DPF (Diesel Particulate Filter)","EGR Valve","Lambda / O2 Sensor"] },
          ac: { name: "Air Conditioning", emoji: "❄️", components: ["AC Compressor","AC Condenser","AC Evaporator","Expansion Valve","Receiver / Dryer","AC Blower Motor"] },
        }
      },
      truck: {
        name: "Truck / HGV", emoji: "🚛", color: "#f59e0b",
        systems: {
          engine: { name: "Diesel Engine", emoji: "🔩", components: ["Turbocharger","Fuel Injectors","EGR Valve","DPF Filter","Intercooler","Diesel Pump","Timing Components","Engine Mounts","Oil Cooler"] },
          transmission: { name: "Gearbox & Drivetrain", emoji: "⚙️", components: ["Manual Gearbox","Automatic Gearbox","Clutch Assembly","Driveshaft","Differential","PTO (Power Take-Off)","Propeller Shaft"] },
          brakes: { name: "Air Brake System", emoji: "🛑", components: ["Air Compressor","Brake Drums","Brake Shoes","ABS Module","Air Tanks / Reservoir","Slack Adjusters","Brake Chambers"] },
          suspension: { name: "Suspension", emoji: "🔧", components: ["Leaf Springs","Air Suspension Bags","Shock Absorbers","King Pins","Fifth Wheel","Landing Gear"] },
          electrical: { name: "Electrical & Diagnostics", emoji: "⚡", components: ["Batteries (24V)","Alternator","Starter Motor","ECU / ECM","CAN Bus System","Trailer Connector","Tachograph"] },
          hydraulics: { name: "Hydraulic System", emoji: "💧", components: ["Hydraulic Pump","Hydraulic Cylinders","Hydraulic Hoses","Control Valves","Hydraulic Fluid Tank","Tipping Mechanism"] },
        }
      },
      industrial: {
        name: "Industrial Machine", emoji: "🏭", color: "#10b981",
        systems: {
          rotating: { name: "Rotating Equipment", emoji: "🌀", components: ["Bearings","Shaft","Coupling","Impeller","Rotor","Mechanical Seal","Wear Ring","Balancing Disc"] },
          motor: { name: "Electric Motor", emoji: "⚡", components: ["Stator Windings","Rotor","Motor Bearings","Capacitor","Motor Shaft","Fan / Cooling","Terminal Box","Insulation"] },
          pump: { name: "Pump", emoji: "💧", components: ["Centrifugal Impeller","Mechanical Seal","Pump Casing","Suction Valve","Discharge Valve","Shaft Seal","Bearing Housing"] },
          compressor: { name: "Compressor", emoji: "🔧", components: ["Piston & Cylinder","Valves (Suction/Discharge)","Connecting Rod","Crankshaft","Intercooler","Air Filter","Unloader Valve","Oil Separator"] },
          conveyor: { name: "Conveyor System", emoji: "📦", components: ["Drive Belt / Chain","Drive Roller","Idler Rollers","Motor & Gearbox","Tensioner","Belt Scrapers","Bearings","Frame Structure"] },
          gearbox: { name: "Gearbox / Reducer", emoji: "⚙️", components: ["Gears (Helical/Worm/Bevel)","Output Shaft","Input Shaft","Bearings","Oil Seals","Housing","Lubrication System"] },
          hydraulics: { name: "Hydraulic System", emoji: "🟦", components: ["Hydraulic Pump","Cylinders","Control Valves","Hydraulic Hoses","Filters","Reservoir","Pressure Relief Valve"] },
        }
      },
      generator: {
        name: "Generator", emoji: "🔋", color: "#8b5cf6",
        systems: {
          engine: { name: "Engine", emoji: "🔩", components: ["Fuel Injectors","Turbocharger","Cooling System","Air Filter","Exhaust System","Engine Oil System","Timing Belt","Governor"] },
          alternator: { name: "Alternator / AVR", emoji: "⚡", components: ["Stator Windings","Rotor","AVR (Voltage Regulator)","Exciter","Brushes","Bearing","Main Output Terminals","Cooling Fan"] },
          control: { name: "Control Panel", emoji: "🖥️", components: ["AMF Controller","Circuit Breaker","ATS Panel","Battery Charger","Fuses","Earthing System","Meters & Gauges"] },
          fuel: { name: "Fuel System", emoji: "⛽", components: ["Fuel Tank","Fuel Pump","Fuel Filter","Day Tank","Fuel Level Sensor","Fuel Pipes & Valves"] },
          cooling: { name: "Cooling System", emoji: "🌡️", components: ["Radiator","Water Pump","Thermostat","Coolant","Cooling Fan","Heat Exchanger"] },
        }
      }
    };

    const SEV = {
      critical: { color: "#ef4444", bg: "rgba(239,68,68,0.08)", border: "rgba(239,68,68,0.3)", label: "CRITICAL" },
      warning:  { color: "#f59e0b", bg: "rgba(245,158,11,0.08)", border: "rgba(245,158,11,0.3)", label: "WARNING"  },
      low:      { color: "#10b981", bg: "rgba(16,185,129,0.08)", border: "rgba(16,185,129,0.3)", label: "STABLE"   },
    };
    const S = k => SEV[k] || SEV.low;

    function MachineDoctorV3() {
      const [step, setStep] = useState(0);
      const [category, setCategory] = useState(null);
      const [system, setSystem] = useState(null);
      const [component, setComponent] = useState(null);
      const [symptoms, setSymptoms] = useState("");
      const [machineAge, setMachineAge] = useState("");
      const [lastService, setLastService] = useState("");
      const [causes, setCauses] = useState([]);
      const [followUps, setFollowUps] = useState([]);
      const [answers, setAnswers] = useState({});
      const [report, setReport] = useState(null);
      const [dots, setDots] = useState("");
      const [visibleCauses, setVisibleCauses] = useState(0);
      const [copied, setCopied] = useState(false);
      const [analysisPhase, setAnalysisPhase] = useState(0);
      const topRef = useRef(null);

      useEffect(() => {
        if (step === 4 || step === 6) {
          const i = setInterval(() => setDots(d => d.length >= 3 ? "" : d + "."), 450);
          return () => clearInterval(i);
        }
      }, [step]);

      useEffect(() => {
        if (step === 5 && causes.length > 0) {
          setVisibleCauses(0);
          causes.forEach((_, i) => setTimeout(() => setVisibleCauses(v => v + 1), i * 220 + 200));
        }
      }, [step, causes]);

      useEffect(() => {
        if (step === 4 || step === 6) {
          setAnalysisPhase(0);
          const i = setInterval(() => setAnalysisPhase(p => (p + 1) % 4), 900);
          return () => clearInterval(i);
        }
      }, [step]);

      useEffect(() => { topRef.current?.scrollIntoView({ behavior: "smooth" }); }, [step]);

      const catData = category ? CATALOG[category] : null;
      const sysData = (catData && system) ? catData.systems[system] : null;
      const allAnswered = followUps.length > 0 && followUps.every(q => answers[q.id]);

      const callAPI = async (prompt, max_tokens) => {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": API_KEY,
            "anthropic-version": "2023-06-01",
          },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens, messages: [{ role: "user", content: prompt }] }),
        });
        const data = await res.json();
        return JSON.parse((data.content?.[0]?.text || "{}").replace(/```json|```/g, "").trim());
      };

      const stage1 = async () => {
        setStep(4);
        const prompt = `You are a master-level diagnostic engineer with 30 years of hands-on experience.
MACHINE CONTEXT:
- Category: ${catData?.name}
- System: ${sysData?.name}
- Specific Component: ${component}
- Age: ${machineAge || "unknown"}
- Last serviced: ${lastService || "unknown"}
- Reported symptoms: "${symptoms}"
Identify the TOP 4 most likely root causes ranked by probability. Generate 3 precise follow-up questions.
Respond ONLY with valid JSON (no markdown):
{
  "possibleCauses": [
    { "cause": "cause name max 5 words", "probability": 82, "explanation": "why this fails in 1 sentence", "urgency": "critical" },
    { "cause": "...", "probability": 60, "explanation": "...", "urgency": "warning" },
    { "cause": "...", "probability": 35, "explanation": "...", "urgency": "warning" },
    { "cause": "...", "probability": 18, "explanation": "...", "urgency": "low" }
  ],
  "followUpQuestions": [
    { "id": "q1", "question": "specific question?", "options": ["option A", "option B", "option C", "option D"] },
    { "id": "q2", "question": "another question?", "options": ["option A", "option B", "option C"] },
    { "id": "q3", "question": "third question?", "options": ["option A", "option B", "option C", "option D"] }
  ]
}`;
        try {
          const parsed = await callAPI(prompt, 1000);
          setCauses(parsed.possibleCauses || []);
          setFollowUps(parsed.followUpQuestions || []);
          setStep(5);
        } catch {
          setCauses([{ cause: "Analysis Error", probability: 0, explanation: "Please try again.", urgency: "low" }]);
          setStep(5);
        }
      };

      const stage2 = async () => {
        setStep(6);
        const answersText = followUps.map(q => `Q: ${q.question}\nA: ${answers[q.id] || "N/A"}`).join("\n\n");
        const causesText = causes.map((c, i) => `${i + 1}. ${c.cause} (${c.probability}%)`).join("\n");
        const prompt = `You are a master-level diagnostic engineer based in India. Provide a precise final diagnosis with costs in Indian Rupees (₹).
MACHINE CONTEXT:
- Category: ${catData?.name}
- System: ${sysData?.name}
- Component: ${component}
- Age: ${machineAge || "unknown"}
- Last serviced: ${lastService || "unknown"}
- Symptoms: "${symptoms}"
Possible causes ranked:\n${causesText}
Follow-up answers:\n${answersText}
COST GUIDELINES — Realistic Indian market prices (parts + labour):
- Small car parts (filters, sensors, belts): ₹500–₹3,000
- Medium car repairs (brake pads, water pump, alternator): ₹2,000–₹12,000
- Major car repairs (engine work, transmission): ₹8,000–₹45,000
- Truck/HGV repairs: 2-3x car equivalent
- Industrial machine repairs: ₹5,000–₹2,00,000
- Generator repairs: ₹2,000–₹80,000
- Include labour (₹300–₹800/hr)
Respond ONLY with valid JSON (no markdown):
{
  "confirmedIssue": "exact issue in max 5 words",
  "severity": "critical",
  "healthScore": 28,
  "diagnosisSummary": "precise 2-3 sentence explanation",
  "immediateAction": "what to do right now in 1-2 sentences",
  "stepByStepFix": ["step 1", "step 2", "step 3", "step 4", "step 5"],
  "timeline": "Fix within 24 hours",
  "estimatedCost": "₹2,500–₹6,000",
  "partsNeeded": ["part 1", "part 2"],
  "toolsNeeded": ["tool 1", "tool 2"],
  "preventionSchedule": "maintenance schedule",
  "downtimeRisk": "what happens if ignored",
  "safeToOperate": true
}`;
        try {
          const parsed = await callAPI(prompt, 1200);
          setReport(parsed);
          setStep(7);
        } catch {
          setReport({ confirmedIssue: "Error", severity: "low", healthScore: 50, diagnosisSummary: "Please retry.", immediateAction: "Retry.", stepByStepFix: [], timeline: "N/A", estimatedCost: "N/A", partsNeeded: [], toolsNeeded: [], preventionSchedule: "N/A", downtimeRisk: "N/A", safeToOperate: true });
          setStep(7);
        }
      };

      const reset = () => {
        setStep(0); setCategory(null); setSystem(null); setComponent(null);
        setSymptoms(""); setMachineAge(""); setLastService("");
        setCauses([]); setFollowUps([]); setAnswers({}); setReport(null);
      };

      const copyReport = () => {
        if (!report) return;
        const txt = [
          "╔══════════════════════════════════════╗",
          "║      MACHINE DOCTOR — REPORT v3      ║",
          "╚══════════════════════════════════════╝",
          "",
          `Category  : ${catData?.name}`,
          `System    : ${sysData?.name}`,
          `Component : ${component}`,
          `Issue     : ${report.confirmedIssue}`,
          `Severity  : ${report.severity?.toUpperCase()}`,
          `Health    : ${report.healthScore}/100`,
          `Safe to operate: ${report.safeToOperate ? "YES" : "NO — STOP IMMEDIATELY"}`,
          "",
          "── DIAGNOSIS ──────────────────────────",
          report.diagnosisSummary,
          "",
          "── IMMEDIATE ACTION ───────────────────",
          report.immediateAction,
          "",
          "── REPAIR STEPS ───────────────────────",
          ...(report.stepByStepFix || []).map((s, i) => `${i + 1}. ${s}`),
          "",
          `Timeline : ${report.timeline}`,
          `Cost est.: ${report.estimatedCost}`,
          "",
          "── PARTS NEEDED ───────────────────────",
          ...(report.partsNeeded || []).map(p => `• ${p}`),
          "",
          "── TOOLS NEEDED ───────────────────────",
          ...(report.toolsNeeded || []).map(t => `• ${t}`),
          "",
          "── PREVENTION ─────────────────────────",
          report.preventionSchedule,
          "",
          "── DOWNTIME RISK ──────────────────────",
          report.downtimeRisk,
        ].join("\n");
        navigator.clipboard?.writeText(txt);
        setCopied(true);
        setTimeout(() => setCopied(false), 2500);
      };

      const ac = catData?.color || "#22d3ee";

      return (
        <div ref={topRef} style={{ minHeight: "100vh", background: "#060810", color: "#cbd5e1", fontFamily: "'IBM Plex Mono', monospace", overflowX: "hidden" }}>
          <style>{`
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-track { background: #0a0d14; } ::-webkit-scrollbar-thumb { background: ${ac}; }
            @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
            @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
            @keyframes spin { to { transform: rotate(360deg); } }
            @keyframes spinRev { to { transform: rotate(-360deg); } }
            @keyframes barGrow { from{width:0} to{width:var(--w)} }
            @keyframes glow { 0%,100%{box-shadow:0 0 6px rgba(34,211,238,0.2)} 50%{box-shadow:0 0 18px rgba(34,211,238,0.6)} }
            @keyframes slideIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
            .fade-up { animation: fadeUp 0.45s ease both; }
            .fade-in { animation: fadeIn 0.35s ease both; }
            .card-hover { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; cursor: pointer; transition: all 0.2s ease; }
            .card-hover:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }
            .card-hover.active { border-color: var(--accent); background: rgba(255,255,255,0.05); }
            .option-btn { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 7px; padding: 10px 14px; cursor: pointer; transition: all 0.18s; text-align: left; color: #64748b; font-family: 'IBM Plex Mono', monospace; font-size: 11px; width: 100%; }
            .option-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); color: #e2e8f0; }
            .option-btn.sel { background: rgba(34,211,238,0.08); border-color: #22d3ee; color: #22d3ee; }
            .primary-btn { background: linear-gradient(135deg, var(--accent-dark, #0369a1), var(--accent, #22d3ee)); border: none; border-radius: 9px; padding: 14px 28px; color: #060810; font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; width: 100%; }
            .primary-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(34,211,238,0.3); }
            .primary-btn:disabled { background: #131824; color: #2a3448; cursor: not-allowed; }
            .ghost-btn { background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 9px; padding: 13px 22px; color: #3a4d66; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
            .ghost-btn:hover { border-color: rgba(255,255,255,0.2); color: #94a3b8; }
            textarea, select { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 9px; color: #e2e8f0; font-family: 'IBM Plex Mono', monospace; font-size: 13px; transition: border-color 0.2s; width: 100%; }
            textarea:focus, select:focus { outline: none; border-color: #22d3ee; box-shadow: 0 0 0 3px rgba(34,211,238,0.08); }
            textarea { padding: 14px 16px; resize: vertical; line-height: 1.8; }
            select { padding: 11px 14px; cursor: pointer; appearance: none; }
            select option { background: #0d1117; }
            .cause-bar { animation: barGrow 1s cubic-bezier(.4,0,.2,1) forwards; }
            .breadcrumb-sep { color: #1e2d3d; margin: 0 4px; }
            .grid-overlay { background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 44px 44px; }
          `}</style>

          <div className="grid-overlay" style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0 }} />
          <div style={{ position: "fixed", left: 0, top: 0, bottom: 0, width: "2px", background: `linear-gradient(180deg, transparent, ${ac}44, transparent)`, zIndex: 1, pointerEvents: "none", animation: "glow 4s infinite" }} />

          <header style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(6,8,16,0.94)", backdropFilter: "blur(16px)", borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "12px 24px", display: "flex", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ position: "relative", width: 34, height: 34 }}>
                <div style={{ position: "absolute", inset: 0, border: `2px solid ${ac}`, borderRadius: "50%", animation: "glow 3s infinite" }} />
                <div style={{ position: "absolute", inset: "6px", borderRadius: "50%", background: ac }} />
              </div>
              <div>
                <div style={{ fontFamily: "'Orbitron', monospace", fontSize: 15, fontWeight: 900, color: ac, letterSpacing: 3 }}>MACHINE DOCTOR</div>
                <div style={{ fontSize: 8, color: "#1e2d3d", letterSpacing: 3 }}>PRECISION DIAGNOSTIC SYSTEM v3</div>
              </div>
            </div>
          </header>

          {step > 0 && (
            <div style={{ padding: "10px 24px", borderBottom: "1px solid rgba(255,255,255,0.04)", background: "rgba(255,255,255,0.01)", fontSize: 10, color: "#334155", letterSpacing: 1, display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
              {catData && <><span style={{ color: catData.color }}>{catData.emoji} {catData.name}</span><span className="breadcrumb-sep">›</span></>}
              {sysData && <><span style={{ color: "#64748b" }}>{sysData.emoji} {sysData.name}</span><span className="breadcrumb-sep">›</span></>}
              {component && <span style={{ color: "#94a3b8" }}>{component}</span>}
            </div>
          )}

          <main style={{ maxWidth: 740, margin: "0 auto", padding: "36px 20px 60px", position: "relative", zIndex: 10 }}>

            {step === 0 && (
              <div className="fade-up">
                <div style={{ marginBottom: 36 }}>
                  <div style={{ fontSize: 9, color: "#22d3ee", letterSpacing: 5, marginBottom: 10 }}>STEP 01 OF 04 — CATEGORY</div>
                  <h1 style={{ fontFamily: "'Orbitron', monospace", fontSize: 28, fontWeight: 900, color: "#f1f5f9", lineHeight: 1.2, marginBottom: 8 }}>WHAT TYPE OF<br /><span style={{ color: "#22d3ee" }}>MACHINE?</span></h1>
                  <p style={{ color: "#334155", fontSize: 12, lineHeight: 1.6 }}>Select the broad category. The AI will adapt its diagnostic database accordingly.</p>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 28 }}>
                  {Object.entries(CATALOG).map(([key, cat]) => (
                    <div key={key} className={`card-hover ${category === key ? "active" : ""}`} style={{ "--accent": cat.color, padding: "22px 20px" }} onClick={() => { setCategory(key); setSystem(null); setComponent(null); }}>
                      <span style={{ fontSize: 32, display: "block", marginBottom: 10 }}>{cat.emoji}</span>
                      <div style={{ fontSize: 14, fontWeight: 600, color: category === key ? cat.color : "#e2e8f0", letterSpacing: 1, marginBottom: 4 }}>{cat.name}</div>
                      <div style={{ fontSize: 10, color: "#334155" }}>{Object.keys(cat.systems).length} systems available</div>
                    </div>
                  ))}
                </div>
                <button className="primary-btn" style={{ "--accent": catData?.color || "#22d3ee", "--accent-dark": "#0369a1" }} disabled={!category} onClick={() => setStep(1)}>SELECT {catData ? catData.name.toUpperCase() : "CATEGORY"} →</button>
              </div>
            )}

            {step === 1 && catData && (
              <div className="fade-up">
                <div style={{ marginBottom: 32 }}>
                  <div style={{ fontSize: 9, color: catData.color, letterSpacing: 5, marginBottom: 10 }}>STEP 02 OF 04 — SYSTEM</div>
                  <h1 style={{ fontFamily: "'Orbitron', monospace", fontSize: 26, fontWeight: 900, color: "#f1f5f9", lineHeight: 1.2, marginBottom: 8 }}>WHICH SYSTEM<br /><span style={{ color: catData.color }}>IS AFFECTED?</span></h1>
                  <p style={{ color: "#334155", fontSize: 12 }}>Identifying the system narrows the fault to the right component group.</p>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 }}>
                  {Object.entries(catData.systems).map(([key, sys]) => (
                    <div key={key} className={`card-hover ${system === key ? "active" : ""}`} style={{ "--accent": catData.color, padding: "16px 18px", display: "flex", alignItems: "center", gap: 12 }} onClick={() => { setSystem(key); setComponent(null); }}>
                      <span style={{ fontSize: 20 }}>{sys.emoji}</span>
                      <div>
                        <div style={{ fontSize: 12, fontWeight: 600, color: system === key ? catData.color : "#e2e8f0" }}>{sys.name}</div>
                        <div style={{ fontSize: 9, color: "#334155", marginTop: 2 }}>{sys.components.length} components</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button className="ghost-btn" onClick={() => setStep(0)}>← BACK</button>
                  <button className="primary-btn" style={{ "--accent": catData.color }} disabled={!system} onClick={() => setStep(2)}>SELECT {sysData ? sysData.name.toUpperCase() : "SYSTEM"} →</button>
                </div>
              </div>
            )}

            {step === 2 && sysData && (
              <div className="fade-up">
                <div style={{ marginBottom: 32 }}>
                  <div style={{ fontSize: 9, color: catData.color, letterSpacing: 5, marginBottom: 10 }}>STEP 03 OF 04 — COMPONENT</div>
                  <h1 style={{ fontFamily: "'Orbitron', monospace", fontSize: 26, fontWeight: 900, color: "#f1f5f9", lineHeight: 1.2, marginBottom: 8 }}>WHICH COMPONENT<br /><span style={{ color: catData.color }}>IS GIVING TROUBLE?</span></h1>
                  <p style={{ color: "#334155", fontSize: 12 }}>Pinpointing the component gives the AI surgical-level diagnostic accuracy.</p>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 24 }}>
                  {sysData.components.map(comp => (
                    <div key={comp} className={`card-hover ${component === comp ? "active" : ""}`} style={{ "--accent": catData.color, padding: "13px 16px", display: "flex", alignItems: "center", gap: 10 }} onClick={() => setComponent(comp)}>
                      <div style={{ width: 6, height: 6, borderRadius: "50%", background: component === comp ? catData.color : "#1e2d3d", flexShrink: 0, transition: "all 0.2s" }} />
                      <span style={{ fontSize: 12, color: component === comp ? catData.color : "#94a3b8", transition: "color 0.2s" }}>{comp}</span>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button className="ghost-btn" onClick={() => setStep(1)}>← BACK</button>
                  <button className="primary-btn" style={{ "--accent": catData.color }} disabled={!component} onClick={() => setStep(3)}>DIAGNOSE {component ? component.toUpperCase() : "COMPONENT"} →</button>
                </div>
              </div>
            )}

            {step === 3 && (
              <div className="fade-up">
                <div style={{ marginBottom: 28 }}>
                  <div style={{ fontSize: 9, color: catData.color, letterSpacing: 5, marginBottom: 10 }}>STEP 04 OF 04 — SYMPTOMS</div>
                  <div style={{ padding: "6px 12px", background: `${catData.color}15`, border: `1px solid ${catData.color}44`, borderRadius: 6, fontSize: 11, color: catData.color, letterSpacing: 1, display: "inline-block", marginBottom: 8 }}>{sysData.emoji} {component}</div>
                  <h1 style={{ fontFamily: "'Orbitron', monospace", fontSize: 22, fontWeight: 900, color: "#f1f5f9", lineHeight: 1.3, marginBottom: 8 }}>DESCRIBE WHAT<br /><span style={{ color: catData.color }}>YOU'RE OBSERVING</span></h1>
                  <p style={{ color: "#334155", fontSize: 12 }}>Be specific — sounds, when it happens, any leaks or smells. More detail = better diagnosis.</p>
                </div>
                <div style={{ marginBottom: 18 }}>
                  <label style={{ fontSize: 9, color: catData.color, letterSpacing: 3, display: "block", marginBottom: 8 }}>SYMPTOM DESCRIPTION *</label>
                  <textarea rows={5} value={symptoms} onChange={e => setSymptoms(e.target.value)} placeholder={`Describe what you're seeing/hearing/smelling from the ${component}.`} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
                  <div>
                    <label style={{ fontSize: 9, color: "#334155", letterSpacing: 3, display: "block", marginBottom: 8 }}>MACHINE / VEHICLE AGE</label>
                    <select value={machineAge} onChange={e => setMachineAge(e.target.value)}>
                      <option value="">Select age</option>
                      <option value="less than 1 year">Less than 1 year</option>
                      <option value="1–3 years">1–3 years</option>
                      <option value="3–7 years">3–7 years</option>
                      <option value="7–15 years">7–15 years</option>
                      <option value="15+ years">15+ years</option>
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize: 9, color: "#334155", letterSpacing: 3, display: "block", marginBottom: 8 }}>LAST SERVICED</label>
                    <select value={lastService} onChange={e => setLastService(e.target.value)}>
                      <option value="">Select timeframe</option>
                      <option value="within 1 month">Within 1 month</option>
                      <option value="1–6 months ago">1–6 months ago</option>
                      <option value="6–12 months ago">6–12 months ago</option>
                      <option value="1–2 years ago">1–2 years ago</option>
                      <option value="never or unknown">Never / Unknown</option>
                    </select>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button className="ghost-btn" onClick={() => setStep(2)}>← BACK</button>
                  <button className="primary-btn" style={{ "--accent": catData.color }} disabled={!symptoms.trim()} onClick={stage1}>ANALYSE {component?.toUpperCase()} →</button>
                </div>
              </div>
            )}

            {(step === 4 || step === 6) && (
              <div style={{ textAlign: "center", padding: "80px 20px" }} className="fade-in">
                <div style={{ position: "relative", width: 90, height: 90, margin: "0 auto 36px" }}>
                  <div style={{ position: "absolute", inset: 0, border: `3px solid rgba(255,255,255,0.05)`, borderTopColor: ac, borderRadius: "50%", animation: "spin 1s linear infinite" }} />
                  <div style={{ position: "absolute", inset: 10, border: `2px solid rgba(255,255,255,0.04)`, borderBottomColor: ac, borderRadius: "50%", animation: "spinRev 0.7s linear infinite" }} />
                  <div style={{ position: "absolute", inset: 22, borderRadius: "50%", background: `${ac}15`, border: `1px solid ${ac}33` }} />
                </div>
                <div style={{ fontFamily: "'Orbitron', monospace", fontSize: 20, color: ac, letterSpacing: 3, marginBottom: 8 }}>{step === 4 ? "STAGE 1" : "FINAL"} ANALYSIS{dots}</div>
                <p style={{ color: "#1e2d3d", fontSize: 10, letterSpacing: 3, marginBottom: 40 }}>{step === 4 ? "IDENTIFYING ALL POSSIBLE CAUSES" : "PINPOINTING EXACT FAULT"}</p>
                <div style={{ display: "flex", flexDirection: "column", gap: 12, maxWidth: 320, margin: "0 auto" }}>
                  {(step === 4 ? ["Parsing symptom signatures", `Querying ${component} failure database`, "Ranking causes by probability", "Generating diagnostic questions"] : ["Processing your answers", "Eliminating impossible causes", "Calculating confidence score", "Generating repair protocol"]).map((t, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, animation: `fadeIn 0.5s ${i * 0.3}s both` }}>
                      <div style={{ width: 5, height: 5, borderRadius: "50%", background: i === analysisPhase ? ac : "#1e2d3d", transition: "background 0.3s", flexShrink: 0 }} />
                      <span style={{ fontSize: 10, color: i === analysisPhase ? "#64748b" : "#1e2d3d", letterSpacing: 1, transition: "color 0.3s" }}>{t.toUpperCase()}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {step === 5 && (
              <div className="fade-up">
                <div style={{ marginBottom: 28 }}>
                  <div style={{ fontSize: 9, color: ac, letterSpacing: 5, marginBottom: 8 }}>STAGE 1 COMPLETE — {causes.length} CAUSES FOUND</div>
                  <h2 style={{ fontFamily: "'Orbitron', monospace", fontSize: 22, color: "#f1f5f9", marginBottom: 6 }}>POSSIBLE CAUSES<br /><span style={{ color: ac }}>FOR {component?.toUpperCase()}</span></h2>
                  <p style={{ color: "#334155", fontSize: 11, lineHeight: 1.6 }}>Ranked by probability. Answer the questions below so Stage 2 can give you a precise diagnosis.</p>
                </div>
                <div style={{ marginBottom: 32, display: "flex", flexDirection: "column", gap: 10 }}>
                  {causes.map((c, i) => (
                    <div key={i} style={{ padding: "16px 18px", borderRadius: 10, background: "rgba(255,255,255,0.02)", border: `1px solid ${S(c.urgency).border}`, opacity: i < visibleCauses ? 1 : 0, transform: i < visibleCauses ? "none" : "translateY(10px)", transition: "all 0.4s ease" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10, gap: 10 }}>
                        <div style={{ display: "flex", gap: 12, alignItems: "flex-start", flex: 1 }}>
                          <span style={{ fontFamily: "'Orbitron', monospace", fontSize: 22, color: "#1e2d3d", fontWeight: 900, flexShrink: 0 }}>#{i + 1}</span>
                          <div>
                            <div style={{ fontSize: 13, color: "#e2e8f0", fontWeight: 600, marginBottom: 4 }}>{c.cause}</div>
                            <div style={{ fontSize: 11, color: "#475569", lineHeight: 1.5 }}>{c.explanation}</div>
                          </div>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 5, flexShrink: 0 }}>
                          <span style={{ fontSize: 9, padding: "3px 8px", background: S(c.urgency).bg, color: S(c.urgency).color, borderRadius: 4, letterSpacing: 1, border: `1px solid ${S(c.urgency).border}` }}>{S(c.urgency).label}</span>
                          <span style={{ fontFamily: "'Orbitron', monospace", fontSize: 18, color: S(c.urgency).color, fontWeight: 900 }}>{c.probability}%</span>
                        </div>
                      </div>
                      <div style={{ height: 3, background: "rgba(255,255,255,0.04)", borderRadius: 2, overflow: "hidden" }}>
                        <div className="cause-bar" style={{ "--w": `${c.probability}%`, height: "100%", background: `linear-gradient(90deg, ${S(c.urgency).color}66, ${S(c.urgency).color})`, borderRadius: 2 }} />
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
                  <div style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.05)" }} />
                  <span style={{ fontSize: 9, color: ac, letterSpacing: 3, whiteSpace: "nowrap" }}>ANSWER TO NARROW DOWN</span>
                  <div style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.05)" }} />
                </div>
                <div style={{ marginBottom: 32, display: "flex", flexDirection: "column", gap: 24 }}>
                  {followUps.map((q, qi) => (
                    <div key={q.id}>
                      <div style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 12 }}>
                        <div style={{ width: 24, height: 24, borderRadius: "50%", flexShrink: 0, marginTop: 1, background: answers[q.id] ? ac : "transparent", border: `1.5px solid ${ac}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: answers[q.id] ? "#060810" : ac, fontWeight: 700, transition: "all 0.2s" }}>{answers[q.id] ? "✓" : qi + 1}</div>
                        <p style={{ fontSize: 13, color: "#cbd5e1", lineHeight: 1.6 }}>{q.question}</p>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, paddingLeft: 36 }}>
                        {q.options.map((opt, oi) => (
                          <button key={oi} className={`option-btn ${answers[q.id] === opt ? "sel" : ""}`} onClick={() => setAnswers(a => ({ ...a, [q.id]: opt }))}>
                            <span style={{ color: answers[q.id] === opt ? "#22d3ee" : "#334155", marginRight: 8, fontSize: 9 }}>{String.fromCharCode(65 + oi)}.</span>{opt}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <button className="primary-btn" style={{ "--accent": ac }} disabled={!allAnswered} onClick={stage2}>{allAnswered ? "RUN FINAL DIAGNOSIS →" : `ANSWER ALL ${followUps.length} QUESTIONS TO CONTINUE`}</button>
              </div>
            )}

            {step === 7 && report && (
              <div className="fade-up">
                {!report.safeToOperate && (
                  <div style={{ padding: "14px 20px", background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.4)", borderRadius: 10, marginBottom: 16, display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 18 }}>🛑</span>
                    <div>
                      <div style={{ fontSize: 10, color: "#ef4444", letterSpacing: 2, fontWeight: 700 }}>STOP OPERATING IMMEDIATELY</div>
                      <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>Continued use may cause irreparable damage or safety risk.</div>
                    </div>
                  </div>
                )}
                <div style={{ padding: "22px", background: `linear-gradient(135deg, ${S(report.severity).bg}, rgba(6,8,16,0))`, border: `1px solid ${S(report.severity).border}`, borderRadius: 12, marginBottom: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
                    <div>
                      <div style={{ fontSize: 9, color: "#334155", letterSpacing: 3, marginBottom: 6 }}>{catData?.name} › {sysData?.name} › {component}</div>
                      <div style={{ fontFamily: "'Orbitron', monospace", fontSize: 24, fontWeight: 900, color: "#f1f5f9", lineHeight: 1.2 }}>{report.confirmedIssue?.toUpperCase()}</div>
                    </div>
                    <div style={{ padding: "10px 18px", borderRadius: 8, background: S(report.severity).bg, border: `1px solid ${S(report.severity).border}`, color: S(report.severity).color, fontFamily: "'Orbitron', monospace", fontSize: 13, letterSpacing: 2, fontWeight: 700 }}>{S(report.severity).label}</div>
                  </div>
                </div>
                {(() => {
                  const hColor = report.healthScore > 60 ? "#10b981" : report.healthScore > 35 ? "#f59e0b" : "#ef4444";
                  return (
                    <div style={{ padding: "16px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, marginBottom: 12 }}>
                      <div style={{ fontSize: 8, color: "#334155", letterSpacing: 3, marginBottom: 8 }}>HEALTH SCORE</div>
                      <div style={{ fontFamily: "'Orbitron', monospace", fontSize: 28, fontWeight: 900, color: hColor }}>{report.healthScore}<span style={{ fontSize: 12, color: "#1e2d3d" }}>/100</span></div>
                      <div style={{ height: 3, background: "rgba(255,255,255,0.04)", borderRadius: 2, overflow: "hidden", marginTop: 10 }}>
                        <div style={{ height: "100%", width: `${report.healthScore}%`, background: hColor, borderRadius: 2, transition: "width 1.5s cubic-bezier(.4,0,.2,1)" }} />
                      </div>
                    </div>
                  );
                })()}
                <div style={{ padding: "18px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, marginBottom: 10 }}>
                  <div style={{ fontSize: 8, color: ac, letterSpacing: 3, marginBottom: 10 }}>DIAGNOSIS</div>
                  <p style={{ fontSize: 13, color: "#cbd5e1", lineHeight: 1.8 }}>{report.diagnosisSummary}</p>
                </div>
                <div style={{ padding: "18px", background: S(report.severity).bg, border: `1px solid ${S(report.severity).border}`, borderRadius: 10, marginBottom: 10 }}>
                  <div style={{ fontSize: 8, color: S(report.severity).color, letterSpacing: 3, marginBottom: 8 }}>⚡ IMMEDIATE ACTION</div>
                  <p style={{ fontSize: 13, color: "#f1f5f9", lineHeight: 1.7, fontWeight: 600 }}>{report.immediateAction}</p>
                </div>
                {report.stepByStepFix?.length > 0 && (
                  <div style={{ padding: "18px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, marginBottom: 10 }}>
                    <div style={{ fontSize: 8, color: ac, letterSpacing: 3, marginBottom: 14 }}>REPAIR PROTOCOL — {component?.toUpperCase()}</div>
                    {report.stepByStepFix.map((s, i) => (
                      <div key={i} style={{ display: "flex", gap: 12, marginBottom: 12, animation: `slideIn 0.4s ${i * 0.08}s both` }}>
                        <div style={{ width: 22, height: 22, borderRadius: "50%", background: `${ac}15`, border: `1px solid ${ac}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: ac, fontWeight: 700, flexShrink: 0 }}>{i + 1}</div>
                        <span style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.6, paddingTop: 3 }}>{s}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
                  {[{ label: "TIMELINE", value: report.timeline, color: S(report.severity).color }, { label: "EST. COST (₹)", value: report.estimatedCost, color: "#f59e0b" }, { label: "IF IGNORED", value: report.downtimeRisk, color: "#ef4444" }].map((item, i) => (
                    <div key={i} style={{ padding: "14px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", borderRadius: 9 }}>
                      <div style={{ fontSize: 7, color: "#1e2d3d", letterSpacing: 2, marginBottom: 6 }}>{item.label}</div>
                      <div style={{ fontSize: 11, color: item.color, lineHeight: 1.5, fontWeight: 600 }}>{item.value}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                  {[{ label: "PARTS NEEDED", items: report.partsNeeded, color: ac }, { label: "TOOLS NEEDED", items: report.toolsNeeded, color: "#94a3b8" }].map((col, i) => col.items?.length > 0 && (
                    <div key={i} style={{ padding: "14px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", borderRadius: 9 }}>
                      <div style={{ fontSize: 7, color: "#334155", letterSpacing: 2, marginBottom: 10 }}>{col.label}</div>
                      {col.items.map((p, j) => (
                        <div key={j} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                          <div style={{ width: 4, height: 4, borderRadius: "50%", background: col.color, flexShrink: 0 }} />
                          <span style={{ fontSize: 10, color: "#64748b" }}>{p}</span>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
                <div style={{ padding: "14px 18px", background: "rgba(16,185,129,0.05)", border: "1px solid rgba(16,185,129,0.15)", borderRadius: 9, marginBottom: 10 }}>
                  <div style={{ fontSize: 8, color: "#10b981", letterSpacing: 3, marginBottom: 6 }}>PREVENTION SCHEDULE</div>
                  <p style={{ fontSize: 11, color: "#64748b", lineHeight: 1.7 }}>{report.preventionSchedule}</p>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <button className="ghost-btn" onClick={reset}>← NEW DIAGNOSIS</button>
                  <button className="primary-btn" style={{ "--accent": ac }} onClick={copyReport}>{copied ? "✓ REPORT COPIED!" : "COPY FULL REPORT →"}</button>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<MachineDoctorV3 />);
  </script>
</body>
</html>
